name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache 7z.dll
        id: cache-7z
        uses: actions/cache@v5
        with:
          path: .7z
          key: 7z-dll-win-x64-v26.01.0

      - name: Cache ghr
        if: steps.cache-7z.outputs.cache-hit != 'true'
        id: cache-ghr
        uses: actions/cache@v5
        with:
          path: |
            ~\.local\pipx\venvs\ghr-bin
            ~\.local\bin\ghr.exe
          key: ghr-bin-0.3.0

      - name: Install ghr
        if: steps.cache-7z.outputs.cache-hit != 'true' && steps.cache-ghr.outputs.cache-hit != 'true'
        run: pipx install ghr-bin==0.3.0

      - name: Download and verify 7z.dll
        if: steps.cache-7z.outputs.cache-hit != 'true'
        run: |
          ghr download boumenot/7-Zip-zstd/7z-dll-win-x64.zip@v26.01.0 --extract .7z
          if ($LASTEXITCODE -ne 0) {
            throw "ghr verification failed for 7z-dll-win-x64.zip (exit code $LASTEXITCODE)"
          }
          ghr download boumenot/7-Zip-zstd/7za-win-x64.zip@v26.01.0 --extract .7z
          if ($LASTEXITCODE -ne 0) {
            throw "ghr verification failed for 7za-win-x64.zip (exit code $LASTEXITCODE)"
          }

      - name: Restore
        run: dotnet restore Zeven.slnx

      - name: Build
        run: dotnet build Zeven.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Zeven.slnx --configuration Release --no-build
        env:
          ZEVEN_7Z_DLL_PATH: ${{ github.workspace }}\.7z\7z.dll

      - name: Extract version from tag
        id: version
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Pack
        run: >-
          dotnet pack src/Zeven/Zeven.csproj
          --configuration Release
          --no-build
          /p:Version=${{ steps.version.outputs.VERSION }}
          --output ./artifacts

      - name: Generate SHA256 checksum
        run: |
          $nupkg = Get-ChildItem ./artifacts/*.nupkg | Select-Object -First 1
          $hash = (Get-FileHash -Algorithm SHA256 $nupkg.FullName).Hash.ToLower()
          "$hash  $($nupkg.Name)" | Out-File -Encoding ascii "$($nupkg.FullName).sha256"
          Write-Output "$($nupkg.Name): $hash"

      - name: Attest NuGet package
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./artifacts/*.nupkg

      - name: Copy sigstore bundle
        run: |
          $nupkg = Get-ChildItem ./artifacts/*.nupkg | Select-Object -First 1
          Copy-Item "${{ steps.attest.outputs.bundle-path }}" "$($nupkg.FullName).sigstore.json"

      - name: Create GitHub Release
        run: |
          $nupkg = Get-ChildItem ./artifacts/*.nupkg | Select-Object -First 1
          $hash = (Get-Content "$($nupkg.FullName).sha256" -Raw).Trim()
          $name = $nupkg.Name

          $body = @"
          ### Assets

          | File | Description |
          |------|-------------|
          | ``$name`` | Zeven NuGet package |

          ### Checksums (SHA256)

          ``````
          $hash
          ``````

          ### Verify attestation

          ``````
          gh release download ${{ github.ref_name }} -R boumenot/Zeven -p "*.nupkg" -p "*.sigstore.json"
          gh attestation verify $name -R boumenot/Zeven --bundle $name.sigstore.json
          ``````
          "@

          $body = ($body -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"

          gh release create ${{ github.ref_name }} `
            ./artifacts/*.nupkg `
            ./artifacts/*.sha256 `
            ./artifacts/*.sigstore.json `
            --title "${{ github.ref_name }}" `
            --notes "$body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
